<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support | LocalShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav id="main-nav"></nav>

    <main class="container" style="padding: 3rem 1.5rem; flex: 1; display: flex; flex-direction: column;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-weight: 800;">AI Assistant</h1>
            <p style="color: var(--text-muted);">Ask me anything about our products or your orders.</p>
        </div>

        <div
            style="flex: 1; max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; background: var(--bg-white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border-color);">
            <!-- Chat Messages Area -->
            <div id="chat-messages"
                style="flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; min-height: 400px; max-height: 500px;">
                <div
                    style="background: var(--bg-light); padding: 1rem; border-radius: 0 1rem 1rem 1rem; align-self: flex-start; max-width: 80%;">
                    Hello! I'm your LocalShop AI assistant. How can I help you today?
                </div>
            </div>

            <!-- Input Area -->
            <div style="padding: 1.5rem; border-top: 1px solid var(--border-color); background: #f8fafc;">
                <form id="chat-form" style="display: flex; gap: 1rem;">
                    <input type="text" id="chat-input" class="form-input" placeholder="Type your message here..."
                        required>
                    <button type="submit" class="btn btn-primary">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
</body>

</html>
