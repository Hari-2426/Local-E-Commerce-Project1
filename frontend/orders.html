<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary | LocalShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav id="main-nav"></nav>

    <main class="container" style="padding: 4rem 1.5rem;">
        <h1 style="margin-bottom: 2rem; font-weight: 800;">Shopping Cart</h1>

        <div style="display: grid; grid-template-columns: 1fr 350px; gap: 2rem; align-items: start;">
            <!-- Cart Items -->
            <div id="cart-items-container"
                style="background: var(--bg-white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow);">
                <!-- Dynamically filled -->
            </div>

            <!-- Order Summary -->
            <div
                style="background: var(--bg-white); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); position: sticky; top: 100px;">
                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    Order Summary</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span style="color: var(--text-muted);">Subtotal</span>
                    <span id="subtotal-amount">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span style="color: var(--text-muted);">Shipping</span>
                    <span style="color: var(--success); font-weight: 600;">FREE</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 800; border-top: 1px solid var(--border-color); padding-top:1.5rem; padding-top: 1rem;">
                    <span>Total</span>
                    <span id="total-amount">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn btn-primary" style="width: 100%; padding: 1rem;">Checkout</button>
                <p style="text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted);">Secure SSL
                    Encrypted Checkout</p>
            </div>
        </div>

        <div id="empty-cart" class="empty-state" style="display: none;">
            <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
                style="margin-bottom: 1rem; opacity: 0.5;">
                <path
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                </path>
            </svg>
            <h3>Your cart is empty</h3>
            <p style="margin-bottom: 2rem;">Looks like you haven't added anything yet.</p>
            <a href="products.html" class="btn btn-primary">Browse Products</a>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/main.js"></script>
    <script src="js/orders.js"></script>
</body>

</html>
