<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | LocalShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav id="main-nav"></nav>

    <header style="background: var(--bg-white); border-bottom: 1px solid var(--border-color); padding: 3rem 0;">
        <div class="container text-center" style="text-align: center;">
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Our Products</h1>
            <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">Discover high-quality essentials
                curated from local artisans and trusted brands.</p>
        </div>
    </header>

    <main class="container">
        <!-- Search and Filter Bar -->
        <div
            style="background: var(--bg-white); padding: 1.5rem; border-radius: var(--radius); margin-top: -2rem; box-shadow: var(--shadow); display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;">
            <div style="flex: 1; position: relative;">
                <input type="text" id="search-input" class="form-input" placeholder="Search for products..."
                    style="padding-left: 2.5rem;">
                <svg style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"
                    width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <div style="min-width: 200px;">
                <select id="category-filter" class="form-input">
                    <option value="all">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Living</option>
                    <option value="health">Health & Beauty</option>
                </select>
            </div>
            <button id="search-btn" class="btn btn-primary">Search</button>
        </div>

        <section id="products-section" style="padding: 2rem 0;">
            <div id="loading-spinner" class="loading">
                <div
                    style="border: 4px solid var(--bg-light); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;">
                </div>
            </div>
            <div id="products-grid" class="products-grid">
                <!-- Products dynamically rendered here -->
            </div>
            <div id="no-products" class="empty-state" style="display: none;">
                <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
                    style="margin-bottom: 1rem; opacity: 0.5;">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <h3>No products found</h3>
                <p>Try adjusting your search or filters.</p>
            </div>
        </section>
    </main>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <footer id="main-footer"></footer>

    <script src="js/main.js"></script>
    <script src="js/products.js"></script>
</body>

</html>
