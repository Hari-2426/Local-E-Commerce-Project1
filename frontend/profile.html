<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | LocalShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav id="main-nav"></nav>

    <main class="container" style="padding: 4rem 1.5rem;">
        <div style="max-width: 800px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem;">
                <div
                    style="width: 100px; height: 100px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; font-weight: 800;">
                    JD
                </div>
                <div>
                    <h1 id="profile-display-name" style="font-weight: 800;">John Doe</h1>
                    <p style="color: var(--text-muted);">Member since March 2026</p>
                </div>
            </div>

            <div
                style="background: var(--bg-white); border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow);">
                <h3 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    Profile Details</h3>
                <form id="profile-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label" for="profile-name">Full Name</label>
                            <input type="text" id="profile-name" class="form-input" value="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="profile-email">Email Address</label>
                            <input type="email" id="profile-email" class="form-input" value="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="profile-phone">Phone Number</label>
                            <input type="tel" id="profile-phone" class="form-input" value="+1 (555) 000-0000">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="profile-location">Location</label>
                            <input type="text" id="profile-location" class="form-input" value="New York, USA">
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label" for="profile-bio">Bio</label>
                        <textarea id="profile-bio" class="form-input" rows="4"
                            style="resize: none;">Shop local enthusiast. Coffee lover.</textarea>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                        <button type="button" class="btn btn-outline" onclick="window.location.reload()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="save-profile-btn">Save Changes</button>
                    </div>
                </form>
            </div>

            <div
                style="margin-top: 2rem; padding: 1.5rem; background: #fff1f2; border-radius: var(--radius); border: 1px solid #fecdd3; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4 style="color: #9f1239;">Danger Zone</h4>
                    <p style="font-size: 0.85rem; color: #be123c;">Delete your account and all associated data.</p>
                </div>
                <button class="btn" style="background: #e11d48; color: white;">Delete Account</button>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
